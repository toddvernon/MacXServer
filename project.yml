name: MacXServer

options:
  bundleIdPrefix: com.toddvernon.swiftx
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:

  Framer:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Framer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toddvernon.swiftx.Framer
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  SwiftXCaptureCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SwiftXCaptureCore
    dependencies:
      - target: Framer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toddvernon.swiftx.SwiftXCaptureCore
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  SwiftXServerCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SwiftXServerCore
    dependencies:
      - target: Framer
      - target: SwiftXCaptureCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toddvernon.swiftx.SwiftXServerCore
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  SwiftXCaptureUI:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SwiftXCaptureUI
    dependencies:
      - target: Framer
      - target: SwiftXCaptureCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toddvernon.swiftx.SwiftXCaptureUI
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  MacXCapture:
    type: application
    platform: macOS
    sources:
      - path: Sources/SwiftXCapture
        excludes:
          - main.swift
      - path: Xcode/CaptureMain.swift
      - path: Xcode/CaptureAssets.xcassets
    dependencies:
      - target: Framer
        embed: true
      - target: SwiftXCaptureCore
        embed: true
      - target: SwiftXCaptureUI
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toddvernon.swiftx.capture
        PRODUCT_NAME: MacXCapture
        INFOPLIST_FILE: Xcode/Capture-Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  MacXServer:
    type: application
    platform: macOS
    sources:
      - path: Sources/SwiftXServer
        excludes:
          - main.swift
      - path: Xcode/ServerMain.swift
      - path: Xcode/Assets.xcassets
    dependencies:
      - target: Framer
        embed: true
      - target: SwiftXCaptureCore
        embed: true
      - target: SwiftXServerCore
        embed: true
      - target: SwiftXCaptureUI
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toddvernon.swiftx.server
        PRODUCT_NAME: MacXServer
        INFOPLIST_FILE: Xcode/Server-Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

schemes:

  MacXCapture:
    build:
      targets:
        MacXCapture: all
    run:
      config: Debug
      executable: MacXCapture
    archive:
      config: Release

  MacXServer:
    build:
      targets:
        MacXServer: all
    run:
      config: Debug
      executable: MacXServer
    archive:
      config: Release
