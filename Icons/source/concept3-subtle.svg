<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FB4F2"/>
      <stop offset="45%" stop-color="#2E7DD6"/>
      <stop offset="100%" stop-color="#0E3D85"/>
    </linearGradient>
    <linearGradient id="topshine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="xfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D8E8F5"/>
    </linearGradient>
    <filter id="xshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" in="SourceAlpha"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect width="1024" height="300" rx="228" fill="url(#topshine)"/>
  <g filter="url(#xshadow)" stroke="url(#xfill)" stroke-width="140" stroke-linecap="round" fill="none">
    <line x1="280" y1="280" x2="744" y2="744"/>
    <line x1="744" y1="280" x2="280" y2="744"/>
  </g>
</svg>
